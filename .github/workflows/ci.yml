# CI for BudgetGuard. Lives under budget-guard/ so it sits at the repo root once
# the package is extracted into its own public repository.
name: CI

on:
  push:
    branches: [main]
  pull_request:

# Run the checkout/setup actions on Node 24 (Node 20 deprecated on runners 2026-06-16).
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  python:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install test/lint tools (the package itself has zero runtime deps)
        working-directory: python
        run: pip install hypothesis bandit
      - name: Unit tests
        working-directory: python
        run: PYTHONPATH=. python tests/test_budgetguard.py
      - name: Property tests (Hypothesis)
        working-directory: python
        run: PYTHONPATH=. python tests/test_properties.py
      - name: Bandit (security lint)
        working-directory: python
        run: bandit -r budgetguard -ll

  typescript:
    name: TypeScript (Node 22)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install
        working-directory: typescript
        run: npm install --no-audit --no-fund
      - name: Build (type-check + emit dist + types)
        working-directory: typescript
        run: npm run build
      - name: Tests (unit + property)
        working-directory: typescript
        run: npm test

  semgrep:
    name: Semgrep (SAST)
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep
    steps:
      - uses: actions/checkout@v4
      - name: Semgrep scan
        run: semgrep scan --config p/python --config p/typescript --config p/secrets --error
